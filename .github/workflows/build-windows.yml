name: Build Windows

on:
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build - Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies (ohne Lifecycle-Scripts; .sh laeuft auf Windows nicht)
        run: bun install --frozen --ignore-scripts

      - name: Native Module fuer Desktop (electron-builder install-app-deps)
        run: bun run --filter=@ade/desktop install:deps

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Build Electron app (Windows NSIS, unsigned)
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run package -- --publish never --win --config electron-builder.ts

      - name: List release output
        if: always()
        working-directory: apps/desktop
        run: dir release
        shell: cmd

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ade-windows-x64-installer
          path: |
            apps/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 30
